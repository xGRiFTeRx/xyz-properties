  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .seed-card { background: var(--white); border-radius: var(--radius); padding: 48px; max-width: 480px; width: 100%; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .seed-card h2 { color: var(--primary); margin-bottom: 8px; font-family: var(--font); font-size: 1.4rem; }
    .seed-card p { color: var(--text-light); font-size: 0.9rem; margin-bottom: 28px; }
    #log { text-align: left; background: var(--bg); border-radius: var(--radius-sm); padding: 16px; font-size: 0.82rem; color: var(--text-light); min-height: 80px; margin-top: 20px; line-height: 1.9; display: none; }
    .done { color: #059669; font-weight: 600; }
    .err  { color: #DC2626; font-weight: 600; }

      { title: "Retail Park Unit",                 location: "Westfield Boulevard",            price: 2100,     priceDisplay: "$2,100/mo",    status: "rent", type: "Commercial Lots",   subCategory: ["commercial","rent"],                  bedrooms: 0, bathrooms: 0, sqft: 2400,  image: "https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?w=600&h=400&fit=crop&auto=format&q=80", featured: true,  isNew: false }
    ];

    const log = document.getElementById('log');
    function print(msg, cls = '') {
      log.style.display = 'block';
      log.innerHTML += `<div class="${cls}">${msg}</div>`;
    }

    document.getElementById('seedBtn').addEventListener('click', async () => {
      const btn = document.getElementById('seedBtn');
      btn.disabled = true;
      btn.textContent = 'Working…';
      log.innerHTML = '';
      log.style.display = 'block';

      try {
        // Delete existing
        print('Clearing existing properties…');
        const snap = await getDocs(collection(db, 'properties'));
        await Promise.all(snap.docs.map(d => deleteDoc(doc(db, 'properties', d.id))));
        print(`Deleted ${snap.size} existing records.`);

        // Add new
        print('Adding 20 new properties…');
        await Promise.all(PROPERTIES.map(p => addDoc(collection(db, 'properties'), p)));
        print('All 20 properties added.', 'done');
        print('✅ Done! You can now delete seed.html and visit <a href="properties.html">properties.html</a>', 'done');
      } catch (err) {
        print('Error: ' + err.message, 'err');
      }

      btn.textContent = 'Seed Complete';
    });
  </script>
</body>
</html>
